spring.application.name=gymtracker-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/gymtracker
spring.datasource.username=postgres
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=true
# ===============================
# LOGGING CONFIGURATION
# ===============================

# Padrão do log no console
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# Reduz verbosidade do Hibernate
logging.level.org.hibernate.SQL=OFF

# JWT
jwt.secret=${JWT_SECRET:gymtracker-dev-secret-key-32-chars-min-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
