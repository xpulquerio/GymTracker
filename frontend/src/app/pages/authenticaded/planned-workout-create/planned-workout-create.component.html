<div class="px-4 pb-24 pt-2 space-y-4">
  <div>
    <h1 class="text-xl font-extrabold text-slate-900 dark:text-white">
      {{ isEditMode ? 'Editar treino planejado' : 'Criar treino planejado' }}
    </h1>
    <p class="text-xs text-slate-500 dark:text-text-secondary">Defina nome e exercicios do seu treino.</p>
  </div>

  @if (errorMessage) {
  <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 dark:bg-red-500/10 dark:border-red-500/30 dark:text-red-300">
    {{ errorMessage }}
  </div>
  }

  <div class="rounded-xl border border-gray-100 dark:border-white/5 bg-white dark:bg-card-dark p-4">
    <label class="text-xs font-semibold uppercase text-slate-500 dark:text-text-secondary">Nome do treino</label>
    <input
      class="mt-2 w-full rounded-lg border border-gray-200 dark:border-white/10 bg-transparent px-3 py-2 text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50"
      type="text"
      maxlength="100"
      [(ngModel)]="description"
      placeholder="Ex: Upper A, Full Body, Cardio..." />
  </div>

  <div class="space-y-3">
    <div class="flex items-center justify-between">
      <h2 class="text-sm font-bold text-slate-700 dark:text-slate-200">Exercicios</h2>
      <button
        class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-primary text-white hover:bg-primary/90 transition"
        (click)="addItem()">
        + Adicionar
      </button>
    </div>

    @for (item of items; track $index; let i = $index) {
    <div class="rounded-xl border border-gray-100 dark:border-white/5 bg-white dark:bg-card-dark p-4 space-y-3">
      <div class="flex items-center justify-between">
        <p class="text-xs font-semibold text-slate-500 dark:text-text-secondary">Item {{ i + 1 }}</p>
        <button
          class="text-xs font-semibold text-red-500 hover:text-red-600 transition"
          (click)="removeItem(i)">
          Remover
        </button>
      </div>

      <select
        class="w-full rounded-lg border border-gray-200 dark:border-white/10 bg-transparent px-3 py-2 text-sm text-slate-800 dark:text-white"
        [(ngModel)]="item.exerciseId">
        @if (loadingExercises) {
        <option [ngValue]="null">Carregando exercicios...</option>
        } @else {
        <option [ngValue]="null">Selecione o exercicio</option>
        }
        @for (exercise of exercises; track exercise.id) {
        <option [ngValue]="exercise.id">
          {{ exercise.description }} ({{ exercise.type }} - {{ exercise.equipment }})
        </option>
        }
      </select>

      <div class="grid grid-cols-3 gap-2">
        <input
          class="rounded-lg border border-gray-200 dark:border-white/10 bg-transparent px-2 py-2 text-xs text-slate-800 dark:text-white"
          type="number"
          min="0"
          [(ngModel)]="item.repetitions"
          placeholder="Reps" />
        <input
          class="rounded-lg border border-gray-200 dark:border-white/10 bg-transparent px-2 py-2 text-xs text-slate-800 dark:text-white"
          type="number"
          min="0"
          step="0.01"
          [(ngModel)]="item.distance"
          placeholder="Distancia" />
        <input
          class="rounded-lg border border-gray-200 dark:border-white/10 bg-transparent px-2 py-2 text-xs text-slate-800 dark:text-white"
          type="number"
          min="0"
          [(ngModel)]="item.durationSeconds"
          placeholder="Duracao(s)" />
      </div>
    </div>
    }
  </div>

  <div class="grid grid-cols-2 gap-2">
    <button
      class="py-3 rounded-xl text-sm font-bold bg-slate-200 text-slate-700 hover:bg-slate-300 transition dark:bg-white/10 dark:text-white dark:hover:bg-white/20"
      routerLink="/train">
      Cancelar
    </button>
    <button
      class="py-3 rounded-xl text-sm font-bold bg-primary text-white hover:bg-primary/90 transition disabled:opacity-70"
      [disabled]="saving"
      (click)="save()">
      @if (saving) {
      Salvando...
      } @else {
      {{ isEditMode ? 'Salvar alteracoes' : 'Salvar treino' }}
      }
    </button>
  </div>
</div>
